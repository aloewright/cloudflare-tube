name = "spooool"
main = "src/workers/index.ts"
compatibility_date = "2024-03-29"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Static Frontend Assets (built by Vite → dist/)
[assets]
directory = "./dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# R2 Bucket - Video Storage
[[r2_buckets]]
binding = "VIDEOS"
bucket_name = "cloudflare-tube-videos"

# D1 Database - Metadata, Users, Comments
[[d1_databases]]
binding = "DB"
database_name = "cloudflare-tube-prod"
database_id = "bcf1a3f9-3732-4770-aae2-774decf68171"
migrations_dir = "src/db/migrations"

# KV Namespace - Cache
[[kv_namespaces]]
binding = "CACHE"
id = "3926c69276244c558e2d8aebb42c01e2"

# KV Namespace - Sessions / Multipart Upload State
[[kv_namespaces]]
binding = "SESSIONS"
id = "0b560dd1327445bd8b5eb6efca3e82e0"

# Queue - Video Encoding Pipeline
[[queues.producers]]
binding = "VIDEO_ENCODING"
queue = "video-encoding"

[[queues.consumers]]
queue = "video-encoding"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "video-encoding-dlq"

# Analytics Engine — view + watch-time datapoints (ALO-144)
[[analytics_engine_datasets]]
binding = "ANALYTICS"
dataset = "spooool_video_analytics"

# Durable Object — channel subscriber fan-out (ALO-156)
[[durable_objects.bindings]]
name = "CHANNEL_SUBSCRIBER_DO"
class_name = "ChannelSubscriberDO"

[[migrations]]
tag = "do_v1"
new_classes = ["ChannelSubscriberDO"]

# Daily 02:00 UTC sweep that hard-deletes users whose 30-day GDPR grace
# window has elapsed (ALO-132). See src/workers/account.ts -> runDeletionSweep.
[triggers]
crons = ["0 2 * * *"]

[vars]
# Comma-separated origin allow-list for CSRF protection on /api/*. Same-origin
# is always allowed in addition to whatever is listed here. Override per env.
ALLOWED_ORIGINS = ""

# Bootstrap-only admin allow-list (ALO-205). Once at least one row exists in
# the `user_roles` table with role='admin', this var is ignored — admins are
# managed via /api/admin/roles. Keep one trusted email here so a fresh deploy
# always has someone who can promote the first real admin.
ADMIN_EMAILS = "aloewright@gmail.com"

# Secrets (set via: wrangler secret put <NAME>)
# BETTER_AUTH_SECRET      (required — random 32+ byte string for signing sessions)
# BETTER_AUTH_URL         (optional — public origin, e.g. https://spooool.workers.dev)
# CLOUDFLARE_ACCOUNT_ID
# CF_STREAM_API_TOKEN
# CF_STREAM_WEBHOOK_SECRET (HMAC secret to verify Cloudflare Stream webhooks)
# STREAM_ENABLED          (set to "true" to route uploads through Cloudflare Stream)
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
