name: Deploy · staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Wrangler deploy (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify quality gates
        run: |
          npm run lint
          npm run type-check
          npm test -- --run

      - name: Build frontend
        run: npm run build

      # Skip deploy step if Cloudflare secrets haven't been configured yet —
      # the workflow stays green so the gate is informational until staging
      # bindings are provisioned (see ALO-172 follow-up for resource IDs).
      - name: Check Cloudflare credentials
        id: creds
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning ::Cloudflare deploy secrets missing — skipping wrangler deploy. Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID in repo Secrets."
          fi

      - name: Deploy worker (staging)
        if: steps.creds.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          environment: staging
