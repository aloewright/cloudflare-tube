name: Deploy · production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (commit SHA, tag, or branch) to deploy
        required: true
        default: main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Wrangler deploy (production)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify quality gates
        run: |
          npm run lint
          npm run type-check
          npm test -- --run

      - name: Build frontend
        run: npm run build

      - name: Check Cloudflare credentials
        id: creds
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -n "$CF_API_TOKEN" ] && [ -n "$CF_ACCOUNT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::error ::Production deploy requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets."
            exit 1
          fi

      - name: Deploy worker (production)
        if: steps.creds.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          environment: production
